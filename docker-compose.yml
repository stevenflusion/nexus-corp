services:

  postgres:
    image: postgres:17-alpine
    container_name: nexus-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: nexus-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexus.testmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

  api:

    build:
      context: .
      dockerfile: Dockerfile.api.dev

    container_name: nexus-api

    working_dir: /app/apps/api

    env_file:
      - .env

    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

    ports:
      - "4000:4000"

    depends_on:
      postgres:
        condition: service_healthy

  admin:

    build:
      context: .
      dockerfile: Dockerfile.admin.dev

    container_name: nexus-admin

    working_dir: /app/apps/admin-panel-web

    env_file:
      - .env

    volumes:
      - .:/app
      - admin_node_modules:/app/node_modules

    ports:
      - "3000:3000"

    depends_on:
      - api

  web:

    build:
      context: .
      dockerfile: Dockerfile.web.dev

    container_name: nexus-web

    working_dir: /app/apps/nexus-corp-web

    env_file:
      - .env

    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

    ports:
      - "4321:4321"

    depends_on:
      - api

volumes:

  postgres_data:

  api_node_modules:

  admin_node_modules:

  web_node_modules:
